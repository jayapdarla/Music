<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canine Encyclopedia | Explore Dog Breeds</title>
    <meta name="description" content="Discover facts, abilities, lifespans, and challenges of popular dog breeds in this interactive encyclopedia.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Breeds</h2>
                <button class="mobile-toggle" id="mobile-toggle"><i class="fas fa-bars"></i></button>
            </div>
            <div class="search-box">
                <input type="text" id="breed-search" placeholder="Search breeds...">
            </div>

            <div class="filter-section">
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sort-select">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="price-desc">Price (Highest)</option>
                        <option value="price-asc">Price (Lowest)</option>
                        <option value="life-desc">Lifespan (Longest)</option>
                        <option value="weight-desc">Weight (Heaviest)</option>
                        <option value="height-desc">Height (Tallest)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Group By</label>
                    <select id="group-select">
                        <option value="none">None</option>
                        <option value="continent">Continent</option>
                        <option value="size">Size</option>
                        <option value="diet">Diet</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Continent</label>
                    <select id="continent-filter">
                        <option value="all">All Continents</option>
                        <option value="europe">Europe</option>
                        <option value="north-america">North America</option>
                        <option value="asia">Asia</option>
                        <option value="africa">Africa</option>
                        <option value="australia">Australia</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Life Expectancy</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="life-filter" value="short"> Short (< 10 yr)</label>
                        <label><input type="checkbox" class="life-filter" value="medium"> Medium (10-15 yr)</label>
                        <label><input type="checkbox" class="life-filter" value="long"> Long (> 15 yr)</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Size</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="size-filter" value="small"> Small</label>
                        <label><input type="checkbox" class="size-filter" value="medium"> Medium</label>
                        <label><input type="checkbox" class="size-filter" value="large"> Large</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Common Color</label>
                    <select id="color-filter">
                        <option value="all">All Colors</option>
                        <option value="black">Black</option>
                        <option value="white">White</option>
                        <option value="brown">Brown / Chocolate</option>
                        <option value="golden">Golden / Yellow</option>
                        <option value="grey">Grey / Silver</option>
                        <option value="tan">Tan / Fawn</option>
                    </select>
                </div>
            </div>

            <ul id="breed-list" class="breed-list">
                <!-- Breeds will be injected here -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="logo">
                    <i class="fas fa-paw"></i>
                    <span>Canine Encyclopedia</span>
                </div>
                <div class="view-controls">
                    <button id="grid-view-btn" class="view-btn active" title="Grid View">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button id="carousel-view-btn" class="view-btn" title="Carousel View">
                        <i class="fas fa-images"></i>
                    </button>
                </div>
            </header>

            <div id="display-container" class="display-container">
                <!-- Grid, Carousel, or Detail View will be injected here -->
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

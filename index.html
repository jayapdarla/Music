<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canine Encyclopedia | Explore Dog Breeds</title>
    <meta name="description" content="Discover facts, abilities, lifespans, and challenges of popular dog breeds in this interactive encyclopedia.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Canine Encyclopedia</h2>
                <button id="mobile-toggle" class="mobile-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="search-box">
                <input type="text" id="breed-search" placeholder="Search breeds...">
            </div>

            <div class="filter-section">

                <div class="filter-group">
                    <label>Group By</label>
                    <select id="group-select">
                        <option value="none">None</option>
                        <option value="continent">Continent</option>
                        <option value="size">Size</option>
                        <option value="diet">Diet</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Continent</label>
                    <select id="continent-filter">
                        <option value="all">All Continents</option>
                        <option value="europe">Europe</option>
                        <option value="north-america">North America</option>
                        <option value="asia">Asia</option>
                        <option value="africa">Africa</option>
                        <option value="australia">Australia</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Awards</label>
                    <select id="award-filter">
                        <option value="all">All Awards</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>User Rating</label>
                    <select id="rating-filter">
                        <option value="all">All Ratings</option>
                        <option value="4.5">4.5 Stars & Up</option>
                        <option value="4.0">4.0 Stars & Up</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Global Rank</label>
                    <select id="rank-filter">
                        <option value="all">All Ranks</option>
                        <option value="10">Top 10</option>
                        <option value="50">Top 50</option>
                        <option value="100">Top 100</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Life Expectancy</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="life-filter" value="short"> Short (< 10 yr)</label>
                        <label><input type="checkbox" class="life-filter" value="medium"> Medium (10-15 yr)</label>
                        <label><input type="checkbox" class="life-filter" value="long"> Long (> 15 yr)</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Size</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="size-filter" value="small"> Small</label>
                        <label><input type="checkbox" class="size-filter" value="medium"> Medium</label>
                        <label><input type="checkbox" class="size-filter" value="large"> Large</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Common Color</label>
                    <select id="color-filter">
                        <option value="all">All Colors</option>
                        <option value="black">Black</option>
                        <option value="white">White</option>
                        <option value="brown">Brown / Chocolate</option>
                        <option value="golden">Golden / Yellow</option>
                        <option value="grey">Grey / Silver</option>
                        <option value="tan">Tan / Fawn</option>
                    </select>
                </div>
            </div>

            <ul id="breed-list" class="breed-list">
                <!-- Breeds will be injected here -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="view-controls" style="display: flex; align-items: center; justify-content: flex-end; width: 100%; gap: 1rem; margin-bottom: 1rem;">
                    <label style="color: #94a3b8; font-weight: 600;">Sort By</label>
                    <select id="sort-select" style="padding: 0.5rem 1rem; border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; outline: none; cursor: pointer;">
                        <option value="name-asc" style="color: black;">Name (A-Z)</option>
                        <option value="price-desc" style="color: black;">Price (Highest)</option>
                        <option value="price-asc" style="color: black;">Price (Lowest)</option>
                        <option value="life-desc" style="color: black;">Lifespan (Longest)</option>
                        <option value="weight-desc" style="color: black;">Weight (Heaviest)</option>
                        <option value="height-desc" style="color: black;">Height (Tallest)</option>
                    </select>
                </div>
            </header>

            <div id="display-container" class="display-container">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
